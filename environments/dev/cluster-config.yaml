apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: argocd
  labels:
    environment: dev
data:
  # Cluster identification
  environment: "dev"
  provider: "aws"
  cluster_name: "dev-eks"

  # AWS configuration
  region: "us-west-2"

  # Feature flags
  veleroEnabled: "false"
  goldilocksEnabled: "true"
  hubbleUiEnabled: "true"
  trivyAdmissionEnabled: "false"

  # Karpenter configuration
  karpenterCpuLimit: "50"
  karpenterMemoryLimitGi: "100"
  karpenterSpotEnabled: "true"

  # Observability
  lokiRetentionDays: "7"
  tempoRetentionDays: "3"
