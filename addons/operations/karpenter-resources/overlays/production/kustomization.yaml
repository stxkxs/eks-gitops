apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: karpenter.sh/v1
      kind: NodePool
      metadata:
        name: default
      spec:
        template:
          spec:
            requirements:
              - key: karpenter.sh/capacity-type
                operator: In
                values: ["spot", "on-demand"]
              - key: kubernetes.io/arch
                operator: In
                values: ["amd64"]
              - key: karpenter.k8s.aws/instance-category
                operator: In
                values: ["m", "c", "r", "i"]
              - key: karpenter.k8s.aws/instance-size
                operator: In
                values: ["large", "xlarge", "2xlarge", "4xlarge"]
        limits:
          cpu: 200
          memory: 400Gi
        disruption:
          budgets:
            # Default: allow 10% disruption
            - nodes: "10%"
            # No disruptions during business hours (9am-5pm UTC, Mon-Fri)
            - nodes: "0"
              schedule: "0 9 * * 1-5"
              duration: 8h

configMapGenerator:
  - name: karpenter-config
    literals:
      - CLUSTER_NAME=production-eks
      - ENVIRONMENT=production
