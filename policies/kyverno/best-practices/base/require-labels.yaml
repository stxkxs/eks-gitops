apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Deployment, StatefulSet
    policies.kyverno.io/description: >-
      Workloads should have standard Kubernetes labels for identification,
      management, and observability. This policy validates that the
      app.kubernetes.io/name and app.kubernetes.io/managed-by labels are set.
spec:
  admission: true
  emitWarning: false
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-app-label
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - kyverno
                - trivy-system
                - cert-manager
                - external-secrets
                - monitoring
                - velero
                - goldilocks
                - opencost
                - vpa
                - keda
                - argo-rollouts
                - argo-events
                - argo-workflows
      validate:
        allowExistingViolations: true
        message: "The label 'app.kubernetes.io/name' is required."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
